<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WardStaff Vault - Secure Patient Handovers</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body {
            font-family: var(--font-sans);
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen">
    <div id="app">
        <!-- Auth / Login View -->
        <div id="login-view" class="hidden min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-sm space-y-8 animate-fade-in">
                <div class="text-center space-y-2">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-zinc-900 rounded-[2rem] text-white mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 class="text-4xl font-black tracking-tight">WardStaff</h1>
                    <p class="text-zinc-400 font-medium">Secure Clinical Vault</p>
                </div>
                <form id="vault-form" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 px-1">Vault Passcode</label>
                        <input type="password" id="passcode" required class="w-full px-6 py-4 rounded-2xl bg-white border-2 border-zinc-100 focus:border-zinc-900 outline-none transition-all font-mono text-center tracking-[0.5em] text-2xl" placeholder="••••">
                    </div>
                    <button type="submit" class="w-full bg-zinc-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-zinc-800 transition-all active:scale-[0.98]">
                        Open Encrypted Vault
                    </button>
                    <p class="text-[10px] text-center text-zinc-300 font-medium px-8">Data is encrypted locally in your browser. If you forget your passcode, the data cannot be recovered.</p>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden">
            <nav class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-zinc-100 z-50">
                <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-zinc-900 rounded-2xl flex items-center justify-center text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        </div>
                        <span class="text-xl font-black tracking-tight">WardStaff</span>
                    </div>
                    <div class="flex items-center gap-2 md:gap-4">
                        <button onclick="app.showImportModal()" class="flex items-center gap-2 px-4 py-2 text-zinc-600 hover:bg-zinc-50 rounded-xl font-bold text-sm transition-all border border-zinc-100">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Import
                        </button>
                        <button onclick="app.showExportModal()" class="flex items-center gap-2 px-4 py-2 text-zinc-600 hover:bg-zinc-50 rounded-xl font-bold text-sm transition-all border border-zinc-100">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Export
                        </button>
                        <button onclick="app.logout()" class="p-3 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-50 rounded-2xl transition-all ml-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>
            </nav>

            <main class="max-w-7xl mx-auto p-4 md:p-8">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    <!-- Left Column: Ward Map -->
                    <div id="sidebar-col" class="lg:col-span-12 transition-all duration-500">
                        <div class="flex items-center justify-between mb-8">
                            <div>
                                <h2 class="text-3xl font-black text-zinc-900">Current Ward</h2>
                                <p class="text-zinc-400 font-medium">Manage patient locations and status</p>
                            </div>
                            <button onclick="app.showAdmitModal()" class="bg-zinc-900 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-xl hover:bg-zinc-800 transition-all flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Admit
                            </button>
                        </div>
                        
                        <div id="patient-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                            <!-- JS will populate this -->
                        </div>
                    </div>

                    <!-- Right Column: Patient Detail -->
                    <div id="detail-col" class="hidden lg:col-span-7 lg:sticky lg:top-28 animate-fade-in">
                        <!-- JS will populate this -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-zinc-900/40 backdrop-blur-sm" onclick="app.closeModal()"></div>
        <div id="modal-content" class="relative bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in min-h-[400px]">
            <!-- JS will populate this -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
