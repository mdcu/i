        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');
        const statusText = document.getElementById('statusText');

        /**
         * Main render function
         */
        function renderResults(query = "") {
            const cleanQuery = query.trim().toLowerCase();
            const dataRows = data.slice(1); // Skip header row
            
            let filtered;

            if (cleanQuery === "") {
                // If empty, show everything (First column only)
                filtered = dataRows;
                statusText.innerText = `Showing all ${dataRows.length} items`;
            } else {
                // Split terms by space for "AND" logic
                const terms = cleanQuery.split(/\s+/).filter(t => t.length > 0);
                
                filtered = dataRows.filter(row => {
                    // Combine all columns of the row into one searchable string
                    const rowContent = row.join(" ").toLowerCase();
                    // Every search term must exist somewhere in the rowContent
                    return terms.every(term => rowContent.includes(term));
                });
                
                statusText.innerText = `Found ${filtered.length} matches`;
            }

            // Create HTML for the list
            if (filtered.length === 0) {
                resultsList.innerHTML = `
                    <li class="p-8 text-center text-gray-400 italic">
                        No results found for "${query}"
                    </li>`;
                return;
            }

            resultsList.innerHTML = filtered.map(row => `
                <li class="px-6 py-4 hover:bg-blue-50 transition-colors cursor-default group">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-800 font-medium group-hover:text-blue-700 transition-colors">
                            ${row[0]}
                        </span>
                        <span class="text-xs font-bold px-2 py-1 bg-gray-100 text-gray-500 rounded uppercase">
                            ${row[1] || 'N/A'}
                        </span>
                    </div>
                </li>
            `).join('');
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            renderResults(e.target.value);
        });

        // Initial Load
        window.onload = () => renderResults();
    </script>
