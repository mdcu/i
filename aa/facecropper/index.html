<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCU AA-I2DT Face Cropper</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
        .card { max-width: 800px; margin: auto; background: var(--card); padding: 32px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin: 24px 0; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #94a3b8; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; }
        input[type="color"] { height: 42px; padding: 2px; cursor: pointer; }
        .full { grid-column: 1 / -1; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        button { color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; }
        #processBtn { background: var(--primary); }
        #testBtn { background: var(--secondary); }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: wait; }
        #status { margin-top: 20px; text-align: center; color: #818cf8; font-weight: 500; }
        
        /* Preview Section Styles */
        #preview { margin-top: 40px; border-top: 2px solid #334155; padding-top: 20px; }
        .preview-item { display: flex; gap: 10px; margin-bottom: 20px; background: #0f172a; padding: 15px; border-radius: 10px; align-items: center; justify-content: center; }
        .preview-box { text-align: center; flex: 1; }
        .preview-box img { max-width: 100%; height: auto; border-radius: 4px; border: 1px solid #475569; max-height: 300px; }
        .preview-label { font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">🎭 MDCU AA-I2DT Face Cropper</h2>
    
    <div class="grid">
        <div class="field full">
            <label>Upload Images</label>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
        
        <div class="field">
            <label>Face Height % (0.1 - 1.0)</label>
            <input type="number" id="faceRatio" value="0.6" step="0.1">
        </div>

        <div class="field">
            <label>Fill Color</label>
            <input type="color" id="fillColor" value="#ffffff">
        </div>

        <div class="field">
            <label>Target Width (px)</label>
            <input type="number" id="outW" value="1080">
        </div>

        <div class="field">
            <label>Target Height (px)</label>
            <input type="number" id="outH" value="1350">
        </div>

        <div class="field full">
            <label>Filename Prefix</label>
            <input type="text" id="prefix" placeholder="e.g. final_">
        </div>
    </div>

    <div class="button-group">
        <button id="testBtn" disabled>Test Run (10 Photos)</button>
        <button id="processBtn" disabled>Execute Batch Processing</button>
    </div>
    
    <div id="status">Ready</div>

    <div id="preview">
        <h3 style="text-align:center; color:#94a3b8;">Preview Panel</h3>
        <div id="previewContainer"></div>
    </div>
</div>

<script type="module">
    import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

    let faceDetector;
    const btn = document.getElementById('processBtn');
    const testBtn = document.getElementById('testBtn');
    const status = document.getElementById('status');
    const previewContainer = document.getElementById('previewContainer');

    async function init() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
        faceDetector = await FaceDetector.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite` },
            runningMode: "IMAGE"
        });
        btn.disabled = false;
        testBtn.disabled = false;
        btn.innerText = "Execute Batch Processing";
        status.innerText = "AI Engine Loaded";
    }
    init();

    // Reusable function for cropping logic to avoid duplication
    async function processImage(file, targetW, targetH, faceRatio, bgColor) {
        const bitmap = await createImageBitmap(file);
        const results = await faceDetector.detect(bitmap);

        if (results.detections.length > 0) {
            const bbox = results.detections[0].boundingBox;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = targetW;
            canvas.height = targetH;

            const sH = bbox.height / faceRatio;
            const sW = sH * (targetW / targetH);
            const centerX = bbox.originX + (bbox.width / 2);
            const centerY = bbox.originY + (bbox.height / 2);
            const sx = centerX - (sW / 2);
            const sy = centerY - (sH / 2);

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, targetW, targetH);
            ctx.drawImage(bitmap, sx, sy, sW, sH, 0, 0, targetW, targetH);
            
            return { 
                blob: await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92)),
                dataUrl: canvas.toDataURL('image/jpeg'),
                originalUrl: URL.createObjectURL(file)
            };
        }
        return null;
    }

    testBtn.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        if (!files.length) return alert("Please select files.");
        
        previewContainer.innerHTML = '';
        status.innerText = "Generating previews...";
        
        const targetW = parseInt(document.getElementById('outW').value);
        const targetH = parseInt(document.getElementById('outH').value);
        const faceRatio = parseFloat(document.getElementById('faceRatio').value);
        const bgColor = document.getElementById('fillColor').value;

        // Limit to first 10 photos
        const limit = Math.min(files.length, 10);
        
        for (let i = 0; i < limit; i++) {
            const result = await processImage(files[i], targetW, targetH, faceRatio, bgColor);
            if (result) {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `
                    <div class="preview-box">
                        <div class="preview-label">Original</div>
                        <img src="${result.originalUrl}">
                    </div>
                    <div class="preview-box" style="color:var(--secondary); font-size:24px;">→</div>
                    <div class="preview-box">
                        <div class="preview-label">Cropped (${targetW}x${targetH})</div>
                        <img src="${result.dataUrl}">
                    </div>
                `;
                previewContainer.appendChild(item);
            }
        }
        status.innerText = `Preview generated for ${limit} images`;
    };

    btn.onclick = async () => {
        const files = document.getElementById('fileInput').files;
        if (!files.length) return alert("Please select files.");

        const targetW = parseInt(document.getElementById('outW').value);
        const targetH = parseInt(document.getElementById('outH').value);
        const faceRatio = parseFloat(document.getElementById('faceRatio').value);
        const bgColor = document.getElementById('fillColor').value;
        const prefix = document.getElementById('prefix').value;
        
        const zip = new JSZip();
        btn.disabled = true;

        for (let i = 0; i < files.length; i++) {
            const result = await processImage(files[i], targetW, targetH, faceRatio, bgColor);
            if (result) {
                zip.file(`${prefix}${files[i].name}`, result.blob);
            }
            status.innerText = `Processing ${i+1}/${files.length}`;
        }

        // Generate custom filename: amountofphoto_H_W_YYYYMMDD_HHMM
        const now = new Date();
        const timestamp = now.getFullYear().toString() + 
                        (now.getMonth() + 1).toString().padStart(2, '0') + 
                        now.getDate().toString().padStart(2, '0') + "_" + 
                        now.getHours().toString().padStart(2, '0') + 
                        now.getMinutes().toString().padStart(2, '0');
        
        const zipFilename = `${files.length}_${targetH}_${targetW}_${timestamp}.zip`;

        const content = await zip.generateAsync({type: "blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = zipFilename;
        link.click();
        
        btn.disabled = false;
        status.innerText = "Batch Complete!";
    };
</script>
</body>
</html>
